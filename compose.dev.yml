services:
  postgres:
    image: postgres:alpine
    restart: unless-stopped
    env_file:
      - .env.dev

  redis:
    image: redis:alpine
    restart: unless-stopped

  marketplace-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env.dev
    depends_on:
      - postgres
      - redis
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    restart: unless-stopped
