services:
  redis:
    image: redis:alpine
    restart: unless-stopped

  marketplace-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    environment:
      NODE_ENV: production
      PORT: 3001
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    ports:
      - "3001:3001"
    restart: unless-stopped
